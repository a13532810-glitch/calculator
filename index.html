<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>营养与代谢计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #43a047 0%, #66bb6a 100%);
            color: white;
            padding: 12px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header p {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 2px;
        }

        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #43a047;
            border-bottom-color: #43a047;
        }

        .content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .page {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 8px;
        }

        .page.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-title .icon {
            width: 22px;
            height: 22px;
            background: #e8f5e9;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 8px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: #555;
            margin-bottom: 3px;
            font-weight: 500;
        }

        .form-label .required {
            color: #e53935;
            margin-left: 2px;
        }

        .form-label .optional {
            color: #999;
            font-size: 10px;
            font-weight: normal;
            margin-left: 2px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            background: #fafafa;
            -webkit-appearance: none;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #43a047;
            background: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-appearance: none;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #43a047 0%, #66bb6a 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(67, 160, 71, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #555;
        }

        .btn-danger {
            background: #ffebee;
            color: #c62828;
        }

        .live-result {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            display: none;
            margin-bottom: 8px;
        }

        .live-result.show {
            display: block;
        }

        .live-result .value {
            font-size: 20px;
            font-weight: 700;
            color: #e65100;
        }

        .live-result .unit {
            font-size: 12px;
            color: #f57c00;
        }

        .live-result .label {
            font-size: 11px;
            color: #ef6c00;
        }

        .live-result .detail-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(230, 81, 0, 0.15);
        }

        .live-result .detail-item {
            font-size: 11px;
            color: #ef6c00;
        }

        .live-result .detail-item .num {
            font-weight: 700;
            font-size: 14px;
            color: #e65100;
        }

        /* 代谢计算页面 */
        .metabolism-page {
            padding: 8px;
            overflow-y: auto;
            height: 100%;
        }

        .result-box {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            text-align: center;
        }

        .result-value {
            font-size: 28px;
            font-weight: 700;
            color: #2e7d32;
        }

        .result-unit {
            font-size: 12px;
            color: #558b2f;
        }

        .result-label {
            font-size: 11px;
            color: #689f38;
            margin-top: 2px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .result-item {
            background: rgba(255,255,255,0.6);
            border-radius: 8px;
            padding: 8px;
        }

        .result-item-value {
            font-size: 16px;
            font-weight: 700;
            color: #2e7d32;
        }

        .result-item-label {
            font-size: 10px;
            color: #689f38;
        }

        .bmi-result-box {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            text-align: center;
        }

        .bmi-value {
            font-size: 24px;
            font-weight: 700;
            color: #1565c0;
        }

        .bmi-status {
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
            padding: 3px 12px;
            border-radius: 12px;
            display: inline-block;
        }

        .bmi-status.thin { background: #e3f2fd; color: #1565c0; }
        .bmi-status.normal { background: #e8f5e9; color: #2e7d32; }
        .bmi-status.overweight { background: #fff3e0; color: #ef6c00; }
        .bmi-status.obese { background: #ffebee; color: #c62828; }

        .clear-cache-btn {
            background: #f5f5f5;
            color: #999;
            border: 1px solid #e0e0e0;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
        }

        /* 提示文字样式 */
        .input-tip {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            padding: 6px 10px;
            background: #f0f7ff;
            border-radius: 6px;
            border-left: 3px solid #42a5f5;
        }

        @media (max-width: 480px) {
            .form-row {
                gap: 6px;
            }
            .card {
                padding: 10px;
            }
        }
    </style>
<base target="_blank">
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>🥗 营养与代谢计算器</h1>
        <p>计算代谢 · 记录饮食 · 管理健康</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('metabolism')">代谢计算</div>
        <div class="tab" onclick="switchTab('food')">食品记录</div>
    </div>

    <div class="content">
        <!-- 代谢计算页面 -->
        <div id="page-metabolism" class="page active metabolism-page">
            <div class="card">
                <div class="card-title">
                    <div class="icon">👤</div>
                    个人信息
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">性别</label>
                        <select class="form-select" id="gender">
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">年龄（岁）</label>
                        <input type="number" class="form-input" id="age" placeholder="" min="1" max="120">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">身高（cm）</label>
                        <input type="number" class="form-input" id="height" placeholder="" min="50" max="250">
                    </div>
                    <div class="form-group">
                        <label class="form-label">体重（kg）</label>
                        <input type="number" class="form-input" id="weight" placeholder="" min="20" max="300" step="0.1">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">活动水平</label>
                    <select class="form-select" id="activity">
                        <option value="1.2">久坐（几乎不运动）</option>
                        <option value="1.375">轻度活动（每周1-3天轻度运动）</option>
                        <option value="1.55" selected>中度活动（每周3-5天中度运动）</option>
                        <option value="1.725">高度活动（每周6-7天高强度运动）</option>
                        <option value="1.9">极高活动（体力劳动/每天高强度训练）</option>
                    </select>
                </div>

                <button class="btn btn-primary" onclick="calculateBMR()">计算代谢率</button>
            </div>

            <div class="card" id="bmr-result" style="display:none;">
                <div class="card-title">
                    <div class="icon">📊</div>
                    计算结果
                </div>

                <div class="result-box">
                    <div>
                        <span class="result-value" id="bmr-value">0</span>
                        <span class="result-unit">大卡/天</span>
                    </div>
                    <div class="result-label">基础代谢率 BMR</div>
                </div>

                <div class="result-grid">
                    <div class="result-item">
                        <div class="result-item-value" id="tdee-value">0</div>
                        <div class="result-item-label">每日总消耗 TDEE</div>
                    </div>
                    <div class="result-item">
                        <div class="result-item-value" id="tdee-kj">0</div>
                        <div class="result-item-label">每日总消耗（千焦）</div>
                    </div>
                </div>

                <div class="bmi-result-box" id="bmi-box">
                    <div class="bmi-value" id="bmi-value">0</div>
                    <div class="bmi-status normal" id="bmi-status">正常</div>
                    <div style="font-size:11px;color:#666;margin-top:4px;" id="bmi-range">正常范围：18.5 - 23.9</div>
                </div>
            </div>

            <div class="card">
                <button class="clear-cache-btn" onclick="clearAllCache()">🗑️ 清空所有缓存数据</button>
            </div>
        </div>

        <!-- 食品记录页面 -->
        <div id="page-food" class="page" style="padding:8px;overflow-y:auto;height:100%;">
            <div class="card">
                <div class="card-title">
                    <div class="icon">🍎</div>
                    添加食品
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">食品名称</label>
                        <input type="text" class="form-input" id="food-name" placeholder="">
                    </div>
                    <div class="form-group">
                        <label class="form-label">重量（克）<span class="required">*</span></label>
                        <input type="number" class="form-input" id="food-weight" placeholder="" min="1" step="0.1" oninput="calculateLiveCalories()">
                    </div>
                </div>

                <div class="input-tip">
                    💡 输入食品外包装上的「每100克」营养成分
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">能量（千焦）<span class="required">*</span></label>
                        <input type="number" class="form-input" id="energy-kj" placeholder="" min="0" step="0.1" oninput="calculateLiveCalories()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">蛋白质（克）<span class="optional">可选</span></label>
                        <input type="number" class="form-input" id="protein-100" placeholder="" min="0" step="0.1" oninput="calculateLiveCalories()">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">脂肪（克）<span class="optional">可选</span></label>
                        <input type="number" class="form-input" id="fat-100" placeholder="" min="0" step="0.1" oninput="calculateLiveCalories()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">碳水（克）<span class="optional">可选</span></label>
                        <input type="number" class="form-input" id="carbs-100" placeholder="" min="0" step="0.1" oninput="calculateLiveCalories()">
                    </div>
                </div>

                <div class="live-result" id="live-result">
                    <span class="value" id="live-kcal">0</span>
                    <span class="unit">大卡</span>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="num" id="live-protein">0</div>
                            <div>蛋白质(g)</div>
                        </div>
                        <div class="detail-item">
                            <div class="num" id="live-fat">0</div>
                            <div>脂肪(g)</div>
                        </div>
                        <div class="detail-item">
                            <div class="num" id="live-carbs">0</div>
                            <div>碳水(g)</div>
                        </div>
                        <div class="detail-item">
                            <div class="num" id="live-energy">0</div>
                            <div>能量(kJ)</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadData() {
            const saved = localStorage.getItem('nutrition-calculator');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.personalInfo) {
                    document.getElementById('gender').value = data.personalInfo.gender || 'male';
                    document.getElementById('age').value = data.personalInfo.age || '';
                    document.getElementById('height').value = data.personalInfo.height || '';
                    document.getElementById('weight').value = data.personalInfo.weight || '';
                    document.getElementById('activity').value = data.personalInfo.activity || '1.55';
                }
            }
        }

        function saveData() {
            const data = {
                personalInfo: {
                    gender: document.getElementById('gender').value,
                    age: document.getElementById('age').value,
                    height: document.getElementById('height').value,
                    weight: document.getElementById('weight').value,
                    activity: document.getElementById('activity').value
                }
            };
            localStorage.setItem('nutrition-calculator', JSON.stringify(data));
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('page-' + tab).classList.add('active');
        }

        function calculateBMR() {
            const gender = document.getElementById('gender').value;
            const age = parseFloat(document.getElementById('age').value);
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const activity = parseFloat(document.getElementById('activity').value);

            if (!age || !height || !weight) {
                alert('请填写完整的个人信息');
                return;
            }

            let bmr;
            if (gender === 'male') {
                bmr = 10 * weight + 6.25 * height - 5 * age + 5;
            } else {
                bmr = 10 * weight + 6.25 * height - 5 * age - 161;
            }

            const tdee = bmr * activity;
            const heightM = height / 100;
            const bmi = weight / (heightM * heightM);

            document.getElementById('bmr-value').textContent = Math.round(bmr);
            document.getElementById('tdee-value').textContent = Math.round(tdee);
            document.getElementById('tdee-kj').textContent = Math.round(tdee * 4.184);

            document.getElementById('bmi-value').textContent = bmi.toFixed(1);

            let statusText, statusClass, rangeText;
            if (bmi < 18.5) {
                statusText = '偏瘦';
                statusClass = 'thin';
                rangeText = '建议增重，正常范围：18.5 - 23.9';
            } else if (bmi < 24) {
                statusText = '正常';
                statusClass = 'normal';
                rangeText = '保持良好，正常范围：18.5 - 23.9';
            } else if (bmi < 28) {
                statusText = '超重';
                statusClass = 'overweight';
                rangeText = '建议减重，正常范围：18.5 - 23.9';
            } else {
                statusText = '肥胖';
                statusClass = 'obese';
                rangeText = '需要减重，正常范围：18.5 - 23.9';
            }

            const statusEl = document.getElementById('bmi-status');
            statusEl.textContent = statusText;
            statusEl.className = 'bmi-status ' + statusClass;
            document.getElementById('bmi-range').textContent = rangeText;

            document.getElementById('bmr-result').style.display = 'block';

            saveData();
        }

        function clearAllCache() {
            if (confirm('确定要清空所有缓存数据吗？')) {
                localStorage.removeItem('nutrition-calculator');

                document.getElementById('gender').value = 'male';
                document.getElementById('age').value = '';
                document.getElementById('height').value = '';
                document.getElementById('weight').value = '';
                document.getElementById('activity').value = '1.55';
                document.getElementById('bmr-result').style.display = 'none';

                alert('已清空所有缓存数据');
            }
        }

        function calculateLiveCalories() {
            const energyKJ = parseFloat(document.getElementById('energy-kj').value) || 0;
            const weight = parseFloat(document.getElementById('food-weight').value) || 0;
            const protein = parseFloat(document.getElementById('protein-100').value) || 0;
            const fat = parseFloat(document.getElementById('fat-100').value) || 0;
            const carbs = parseFloat(document.getElementById('carbs-100').value) || 0;

            if (energyKJ > 0 && weight > 0) {
                const ratio = weight / 100;
                const kcal = (energyKJ * ratio) / 4.184;
                const totalProtein = protein * ratio;
                const totalFat = fat * ratio;
                const totalCarbs = carbs * ratio;
                const totalEnergy = energyKJ * ratio;

                document.getElementById('live-kcal').textContent = Math.round(kcal);
                document.getElementById('live-protein').textContent = totalProtein > 0 ? totalProtein.toFixed(1) : '0';
                document.getElementById('live-fat').textContent = totalFat > 0 ? totalFat.toFixed(1) : '0';
                document.getElementById('live-carbs').textContent = totalCarbs > 0 ? totalCarbs.toFixed(1) : '0';
                document.getElementById('live-energy').textContent = Math.round(totalEnergy);
                document.getElementById('live-result').classList.add('show');
            } else {
                document.getElementById('live-result').classList.remove('show');
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
